# Validates the published Vim tips file is the generated output of the category sources.
#
# tips/vim_tips_min.json is a generated artifact: it must never be hand-edited.
# It is produced from the authoring files in tips/categories/ by the
# `generateVimTipsMin` Gradle task. This workflow regenerates it and fails if the
# committed file is stale (i.e. the sources were changed without regenerating, or
# the file was edited by hand).

name: Validate Tips

on:
  push:
    branches: [ main ]
    paths:
      - 'tips/categories/**'
      - 'tips/vim_tips_min.json'
      - 'build.gradle.kts'
      - '.github/workflows/minify-json.yml'
  pull_request:
    paths:
      - 'tips/categories/**'
      - 'tips/vim_tips_min.json'
      - 'build.gradle.kts'
      - '.github/workflows/minify-json.yml'

jobs:
  validate:
    name: Validate generated tips
    runs-on: ubuntu-latest
    steps:
      # Check out the current repository
      - name: Fetch Sources
        uses: actions/checkout@v6

      # Set up the Java environment for the next steps
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      # Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      # Regenerate the published file from the category sources
      - name: Generate vim_tips_min.json
        run: ./gradlew generateVimTipsMin --rerun-tasks

      # Fail if the committed file does not match the regenerated output
      - name: Verify vim_tips_min.json is up to date
        run: |
          if ! git diff --exit-code --stat tips/vim_tips_min.json; then
            echo "::error::tips/vim_tips_min.json is out of date or was edited by hand."
            echo "::error::Edit the sources in tips/categories/ and run ./gradlew generateVimTipsMin, then commit the result."
            git --no-pager diff tips/vim_tips_min.json
            exit 1
          fi
          echo "tips/vim_tips_min.json matches the generated output."
